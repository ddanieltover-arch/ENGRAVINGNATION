name: SEO Validation

on:
  pull_request:
    branches: ["*"]

jobs:
  seo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: store
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: store/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Check metadata coverage
        run: node scripts/seo-audit.js

      - name: Validate JSON-LD presence
        run: node scripts/validate-schema.js

      - name: Verify article image assets
        run: node scripts/verify-article-images.js

      - name: Check internal links
        run: node scripts/check-internal-links.js

      - name: Validate priority landing pages in sitemap
        run: node scripts/check-priority-landing-pages.js
